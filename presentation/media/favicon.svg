<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Ice cube body -->
  <defs>
    <linearGradient id="ice-face-top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D6EAF8"/>
      <stop offset="100%" stop-color="#AED6F1"/>
    </linearGradient>
    <linearGradient id="ice-face-left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#AED6F1"/>
      <stop offset="100%" stop-color="#85C1E9"/>
    </linearGradient>
    <linearGradient id="ice-face-right" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#85C1E9"/>
      <stop offset="100%" stop-color="#5DADE2"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Top face -->
  <polygon points="64,16 112,40 64,64 16,40" fill="url(#ice-face-top)" stroke="#7FB3D8" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Left face -->
  <polygon points="16,40 64,64 64,112 16,88" fill="url(#ice-face-left)" stroke="#7FB3D8" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Right face -->
  <polygon points="112,40 64,64 64,112 112,88" fill="url(#ice-face-right)" stroke="#7FB3D8" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Shine on top face -->
  <polygon points="40,28 72,22 52,42 28,36" fill="url(#shine)" opacity="0.5"/>

  <!-- Highlight lines on left face -->
  <line x1="30" y1="52" x2="30" y2="76" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <line x1="42" y1="58" x2="42" y2="86" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>

  <!-- Small sparkle top-left -->
  <circle cx="36" cy="24" r="2.5" fill="white" opacity="0.7"/>
  <circle cx="92" cy="36" r="1.5" fill="white" opacity="0.5"/>
</svg>
